name: Run Crypto Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run bot
        run: python3 bot_trader.py

      - name: Save updated state files
        run: |
          git config user.email "bot@labworksolutions.com"
          git config user.name "CryptoBot"
          git add -A
          git diff --staged --quiet || git commit -m "Bot state update $(date)"
          git push
